name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Least-privilege default: GITHUB_TOKEN gets read-only access to repo contents
# and nothing else. Each job re-declares the same minimal scope explicitly.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Supply-chain gate: fail fast on known-vulnerable dependencies (RUSTSEC
  # advisory database) before the expensive native build runs. Reads the
  # committed Cargo.lock so the audited dependency set is reproducible.
  dependency-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - name: Install cargo-audit
        uses: taiki-e/install-action@754bf4dbae00ad1b16b244717154b96ba27d2416 # cargo-audit

      - name: Audit dependencies
        run: cargo audit

  build-and-test:
    needs: dependency-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # --locked forces cargo to honor the committed Cargo.lock exactly. A drift
      # between Cargo.toml and Cargo.lock fails the build instead of silently
      # resolving new transitive dependencies, keeping CI reproducible.
      - name: Build
        run: cargo build --locked --verbose

      - name: Run tests
        run: cargo test --locked --verbose
